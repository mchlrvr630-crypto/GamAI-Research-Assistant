<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v5.0 | Advanced Research Architect</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 40px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        .hidden { display: none; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003366; }
        #output-area { margin-top: 40px; padding: 35px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; line-height: 1.8; }
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); }
        .key-status { font-size: 0.8rem; text-align: right; color: #666; margin-top: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>STEM Experimental & Social Science Frameworks</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Typology</div>
        <div class="grid">
            <div class="input-box full">
                <label>Research Type</label>
                <select id="researchType" onchange="toggleSTEM()">
                    <option value="Non-Experimental">Non-Experimental (Social Science / Correlational)</option>
                    <option value="Experimental">STEM Experimental (Product Development / Laboratory)</option>
                </select>
            </div>
        </div>

        <div class="section-title">II. Variables & Sub-Variables</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., Modular Instruction">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Mathematical Performance">
            </div>
            <div class="input-box">
                <label>IV Sub-variables (Leave blank if none)</label>
                <input type="text" id="ivSub" placeholder="e.g., Topic Mastery, Resource Availability">
            </div>
            <div class="input-box">
                <label>DV Sub-variables (Leave blank if none)</label>
                <input type="text" id="dvSub" placeholder="e.g., Problem Solving, Concept Recall">
            </div>
        </div>

        <div id="stemFields" class="hidden">
            <div class="section-title">III. STEM Trial Specifications</div>
            <div class="input-box full">
                <label>Proposed Trials/Evaluations</label>
                <textarea id="stemTrials" placeholder="Describe your testing process or evaluation criteria..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()">Architect My Research</button>
        <div id="loading" class="loading">⚙️ Generating Frameworks & Statistical Mapping...</div>
        <div id="key-reset" class="key-status" onclick="resetKey()">Reset API Key</div>

        <div id="output-area">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
function toggleSTEM() {
    const type = document.getElementById('researchType').value;
    document.getElementById('stemFields').className = (type === "Experimental") ? "" : "hidden";
}

function resetKey() {
    localStorage.removeItem("gamai_key");
    alert("API Key cleared. You will be asked for a new one on your next request.");
}

async function generateResearch() {
    // SECURITY: Use localStorage to keep the key out of the GitHub source code
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Please enter your Gemini API Key (Stored only in your browser):");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    const type = document.getElementById('researchType').value;
    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    const ivSub = document.getElementById('ivSub').value || "N/A";
    const dvSub = document.getElementById('dvSub').value || "N/A";
    const stemTrials = document.getElementById('stemTrials').value;

    if(!iv || !dv) { alert("Please input the main variables."); return; }

    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";

    const promptText = `Act as an Academic Expert. Research Type: ${type}. 
    IV: ${iv} (Sub-variables: ${ivSub}), DV: ${dv} (Sub-variables: ${dvSub}). 
    STEM Context: ${stemTrials}.
    
    Generate the following structured research logic:
    1. 3 Professional Titles.
    2. THEORETICAL FRAMEWORK: Identify specific laws or academic theories.
    3. CONCEPTUAL FRAMEWORK: Explain the logic of the study using an IPO or IV-DV approach.
    4. STATEMENT OF THE PROBLEM: 
       - Start with a formal "General Statement" paragraph (Example: "This study determines the relationship between...").
       - Numbered "Specific Questions" (SOP) including any sub-variables provided.
    5. EVALUATION/TRIALS (For STEM): Suggest technical tests/procedures.
    6. STATISTICAL TOOLS: Assign a specific statistical test (e.g. Pearson r, ANOVA, Mean) for EVERY specific question.

    Format: Use <h3> for headers and <strong> for highlights.`;

    try {
        // USE THE STABLE 2026 ALIAS: gemini-flash-latest (Points to Gemini 3 series)
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-flash-latest:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        
        if(data.error) {
            if(data.error.message.includes("API_KEY_INVALID")) {
                localStorage.removeItem("gamai_key");
            }
            throw new Error(data.error.message);
        }

        const textResult = data.candidates[0].content.parts[0].text;
        document.getElementById('ai-response').innerHTML = textResult
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/### (.*?)\n/g, "<h3>$1</h3>");
            
    } catch (err) {
        document.getElementById('ai-response').innerHTML = "<b style='color:red;'>Connection Error:</b> " + err.message + 
        "<br><br><b>Important:</b> If your key was leaked on GitHub, Google has disabled it. Delete the old key and create a BRAND NEW one in AI Studio.";
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('output-area').style.display = "block";
    }
}
</script>
</body>
</html>
