<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v8.0 | 2026 Research Architect</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 40px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        .hidden { display: none; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003366; }
        #output-area { margin-top: 40px; padding: 35px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; line-height: 1.8; }
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Standardized for Gemini 3.1 Series (Updated April 2026)</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Typology</div>
        <div class="grid">
            <div class="input-box full">
                <label>Research Type</label>
                <select id="researchType" onchange="toggleSTEM()">
                    <option value="Non-Experimental">Non-Experimental (Social Science / Correlational)</option>
                    <option value="Experimental">STEM Experimental (Product Development / Laboratory)</option>
                </select>
            </div>
        </div>

        <div class="section-title">II. Variables</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., pH Levels">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Growth Rate">
            </div>
            <div class="input-box">
                <label>IV Sub-variables</label>
                <input type="text" id="ivSub" placeholder="Indicator A, B...">
            </div>
            <div class="input-box">
                <label>DV Sub-variables</label>
                <input type="text" id="dvSub" placeholder="Indicator X, Y...">
            </div>
        </div>

        <div id="stemFields" class="hidden">
            <div class="section-title">III. STEM Trial Specifications</div>
            <textarea id="stemTrials" style="width:96%" placeholder="Describe your trials..."></textarea>
        </div>

        <button onclick="generateResearch()">Architect My Research</button>
        <div id="loading" class="loading">⚡ Initializing Gemini 3.1 Lite Lane...</div>

        <div id="output-area">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
function toggleSTEM() {
    const type = document.getElementById('researchType').value;
    document.getElementById('stemFields').className = (type === "Experimental") ? "" : "hidden";
}

async function generateResearch() {
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Please enter your Gemini API Key:");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";

    const promptText = `Act as an Academic Expert. Research Type: ${document.getElementById('researchType').value}. 
    IV: ${document.getElementById('iv').value} (${document.getElementById('ivSub').value}), 
    DV: ${document.getElementById('dv').value} (${document.getElementById('dvSub').value}). 
    STEM Context: ${document.getElementById('stemTrials').value}.
    Generate: 1. 3 Titles. 2. Theoretical Framework. 3. Conceptual Framework. 4. SOP (General + Specific Numbered Questions). 5. STEM Trials. 6. Statistical Tools for each question.
    Format with <h3> and <strong>.`;

    try {
        // APRIL 2026 STABLE MODEL ID
        const model = "gemini-3.1-flash-lite-preview";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        
        if(data.error) {
            // Check for 404 (wrong model) or 403 (leaked key)
            if(data.error.code === 404) throw new Error("Model ID Error. This region may require Gemini 3.1 Pro.");
            if(data.error.code === 403) {
                localStorage.removeItem("gamai_key");
                throw new Error("API Key Blocked. Please create a NEW key in AI Studio.");
            }
            throw new Error(data.error.message);
        }

        const textResult = data.candidates[0].content.parts[0].text;
        document.getElementById('ai-response').innerHTML = textResult
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/### (.*?)\n/g, "<h3>$1</h3>");
            
    } catch (err) {
        document.getElementById('ai-response').innerHTML = "<b style='color:red;'>Architectural Error:</b> " + err.message;
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('output-area').style.display = "block";
    }
}
</script>
</body>
</html>
