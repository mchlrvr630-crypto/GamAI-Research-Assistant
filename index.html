<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v5.5 | Research Architect</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 40px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        .hidden { display: none; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003366; }
        #output-area { margin-top: 40px; padding: 35px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; line-height: 1.8; }
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Official 2026 Standard for STEM & Social Science Design</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Typology</div>
        <div class="grid">
            <div class="input-box full">
                <label>Research Type</label>
                <select id="researchType" onchange="toggleSTEM()">
                    <option value="Non-Experimental">Non-Experimental (Social Science / Correlational)</option>
                    <option value="Experimental">STEM Experimental (Product Development / Laboratory)</option>
                </select>
            </div>
        </div>

        <div class="section-title">II. Variables & Sub-Variables</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., pH Concentration">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Seed Germination Rate">
            </div>
            <div class="input-box">
                <label>IV Sub-variables (Indicators)</label>
                <input type="text" id="ivSub" placeholder="e.g., Level 1, Level 2 (or N/A)">
            </div>
            <div class="input-box">
                <label>DV Sub-variables (Indicators)</label>
                <input type="text" id="dvSub" placeholder="e.g., Root length, Stem height (or N/A)">
            </div>
        </div>

        <div id="stemFields" class="hidden">
            <div class="section-title">III. STEM Trial Specifications</div>
            <div class="input-box full">
                <label>Proposed Experimental Procedures</label>
                <textarea id="stemTrials" placeholder="Describe your tests, trials, and replicates..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()">Architect My Research</button>
        <div id="loading" class="loading">📡 Connecting to Gemini 3.1 Engine...</div>

        <div id="output-area">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
function toggleSTEM() {
    const type = document.getElementById('researchType').value;
    document.getElementById('stemFields').className = (type === "Experimental") ? "" : "hidden";
}

async function generateResearch() {
    // SECURE KEY HANDLING
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Please enter your Gemini API Key (stored locally for safety):");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    const type = document.getElementById('researchType').value;
    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    const ivSub = document.getElementById('ivSub').value || "N/A";
    const dvSub = document.getElementById('dvSub').value || "N/A";
    const stemTrials = document.getElementById('stemTrials').value;

    if(!iv || !dv) { alert("Main variables are required."); return; }

    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";

    const promptText = `Act as an Academic Expert. Research Type: ${type}. IV: ${iv} (${ivSub}), DV: ${dv} (${dvSub}). STEM Context: ${stemTrials}. 
    Output these sections:
    1. 3 PROFESSIONAL TITLES.
    2. THEORETICAL FRAMEWORK: Specific supporting theories/laws.
    3. CONCEPTUAL FRAMEWORK: IPO/Logic explanation.
    4. STATEMENT OF THE PROBLEM: One formal General Statement paragraph, followed by Specific Numbered Questions.
    5. EVALUATIONS (For STEM): Technical tests/procedures.
    6. STATISTICAL TOOLS: Map a test to EVERY numbered question.
    Format: Use <h3> for headers and <strong> for highlights.`;

    try {
        // APRIL 2026 STABLE CONFIGURATION:
        // Use v1beta for Gemini 3.1 models
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        
        if(data.error) {
            if(data.error.code === 403 || data.error.message.includes("API key")) {
                localStorage.removeItem("gamai_key"); // Reset bad key
            }
            throw new Error(data.error.message);
        }

        const textResult = data.candidates[0].content.parts[0].text;
        document.getElementById('ai-response').innerHTML = textResult
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/### (.*?)\n/g, "<h3>$1</h3>");
            
    } catch (err) {
        document.getElementById('ai-response').innerHTML = "<b style='color:red;'>Architectural Failure:</b> " + err.message + "<br><br><b>How to fix:</b> Ensure you are using a NEW API key from AI Studio created after April 1, 2026.";
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('output-area').style.display = "block";
    }
}
</script>
</body>
</html>
