<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v3.0 | Advanced Research Architect</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; background: white; }
        .content { padding: 40px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        .hidden { display: none; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003366; }
        #output-area { margin-top: 30px; padding: 30px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; line-height: 1.7; }
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Customized for STEM Experimental & Social Science Research</p>
    </div>

    <div class="content">
        <div class="section-title">I. Research Typology</div>
        <div class="grid">
            <div class="input-box full">
                <label>Type of Research</label>
                <select id="researchType" onchange="toggleSTEM()">
                    <option value="Non-Experimental">Non-Experimental (Correlational/Descriptive)</option>
                    <option value="Experimental">STEM Experimental (Product Development/Trials)</option>
                </select>
            </div>
        </div>

        <div class="section-title">II. Variable Encoding</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="Main cause/treatment">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="Main outcome/effect">
            </div>
            <div class="input-box">
                <label>Sub-variables for IV (Optional)</label>
                <input type="text" id="ivSub" placeholder="e.g., Accuracy, Efficiency (Comma separated)">
            </div>
            <div class="input-box">
                <label>Sub-variables for DV (Optional)</label>
                <input type="text" id="dvSub" placeholder="e.g., Speed, Durability (Comma separated)">
            </div>
        </div>

        <div id="stemFields" class="hidden">
            <div class="section-title">III. STEM Specifications</div>
            <div class="input-box full">
                <label>Planned Trials/Evaluations</label>
                <textarea id="stemTrials" placeholder="e.g., 3 concentrations, 24-hour observation, sensory evaluation..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()">Architect My Research</button>
        <div id="loading" class="loading">⚙️ Constructing Research Framework...</div>

        <div id="output-area">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
function toggleSTEM() {
    const type = document.getElementById('researchType').value;
    document.getElementById('stemFields').className = (type === "Experimental") ? "" : "hidden";
}

async function generateResearch() {
    const apiKey = "AIzaSyAqaHd3PE1l8CiqVebkseBUCIiIM0u37j4"; // Replace with your new key
    const type = document.getElementById('researchType').value;
    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    const ivSub = document.getElementById('ivSub').value || "N/A";
    const dvSub = document.getElementById('dvSub').value || "N/A";
    const stemTrials = document.getElementById('stemTrials').value;

    if(!iv || !dv) { alert("Please fill in main variables."); return; }

    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";

    let stemContext = (type === "Experimental") ? `This is a STEM Experimental study. Planned trials: ${stemTrials}` : "This is a Non-Experimental study.";

    const prompt = `Act as a Research Expert.
    Context: ${stemContext}
    Variables: IV: ${iv} (Sub: ${ivSub}), DV: ${dv} (Sub: ${dvSub}).
    
    TASK:
    1. 3 Professional Titles.
    2. STATEMENT OF THE PROBLEM: Format exactly as:
       - A General Statement (Paragraph form).
       - Specific Questions (Numbered list, include sub-variables if provided).
    3. DESIGN: Suggest the best quantitative/experimental design.
    4. EVALUATION (For STEM): Suggest specific tests/trials to be done.
    5. STATISTICAL TOOLS: List which specific statistical test should be used for EACH research question (e.g., Q1: Mean; Q2: T-test, etc.).`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        const text = data.candidates[0].content.parts[0].text;
        document.getElementById('ai-response').innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    } catch (err) {
        document.getElementById('ai-response').innerHTML = "Error connecting. Check API key.";
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('output-area').style.display = "block";
    }
}
</script>
</body>
</html>
