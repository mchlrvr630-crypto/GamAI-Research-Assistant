<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v9.0 | Research Architect</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 40px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003366; }
        #output-area { margin-top: 40px; padding: 35px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; line-height: 1.8; }
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Specialized for Social Science, Education, and Business Research</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Parameters</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., Financial Literacy">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Investment Behavior">
            </div>
            <div class="input-box">
                <label>IV Indicators (Sub-variables)</label>
                <input type="text" id="ivSub" placeholder="e.g., Budgeting, Saving, Debt Mgmt">
            </div>
            <div class="input-box">
                <label>DV Indicators (Sub-variables)</label>
                <input type="text" id="dvSub" placeholder="e.g., Risk Tolerance, Portfolio Diversification">
            </div>
        </div>

        <div class="section-title">II. Contextual Design</div>
        <div class="grid">
            <div class="input-box">
                <label>Target Respondents</label>
                <input type="text" id="respondents" placeholder="e.g., Public School Teachers, Small Business Owners">
            </div>
            <div class="input-box">
                <label>Research Locale</label>
                <input type="text" id="locale" placeholder="e.g., Manila, Philippines">
            </div>
            <div class="input-box full">
                <label>Brief Study Goal</label>
                <textarea id="goal" placeholder="Explain what you want to find out in 1-2 sentences..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()">Architect My Research</button>
        <div id="loading" class="loading">📜 Drafting Academic Frameworks...</div>

        <div id="output-area">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
async function generateResearch() {
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Enter your Gemini API Key:");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";

    const promptText = `Act as a Senior Academic Consultant and Statistician.
    IV: ${document.getElementById('iv').value} (Indicators: ${document.getElementById('ivSub').value})
    DV: ${document.getElementById('dv').value} (Indicators: ${document.getElementById('dvSub').value})
    Respondents: ${document.getElementById('respondents').value}
    Locale: ${document.getElementById('locale').value}
    Goal: ${document.getElementById('goal').value}

    Generate a complete research blueprint including:
    1. THREE PROFESSIONAL TITLES.
    2. THEORETICAL FRAMEWORK: Identify at least two academic theories or models that support this specific study.
    3. CONCEPTUAL FRAMEWORK: A logical narrative explaining the relationship between variables.
    4. STATEMENT OF THE PROBLEM (SOP): 
       - A formal General Statement paragraph.
       - Numbered specific questions (profile, levels of IV/DV, relationship).
    5. RESEARCH METHODOLOGY: Recommended design (e.g., Descriptive-Correlational) and sampling technique.
    6. STATISTICAL TREATMENT: Assign the correct statistical tool (Mean, Pearson r, t-test, etc.) for EVERY specific question in the SOP.

    Format: Use <h3> for headers and <strong> for bold text. Use clean bullet points.`;

    try {
        // Updated to the current stable 2026 Lite model
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        if(data.error) throw new Error(data.error.message);

        document.getElementById('ai-response').innerHTML = data.candidates[0].content.parts[0].text
            .replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/### (.*?)\n/g, "<h3>$1</h3>");
        document.getElementById('output-area').style.display = "block";
    } catch (err) {
        document.getElementById('ai-response').innerHTML = "<b style='color:red;'>Error:</b> " + err.message;
        document.getElementById('output-area').style.display = "block";
    } finally {
        document.getElementById('loading').style.display = "none";
    }
}
</script>
</body>
</html>
