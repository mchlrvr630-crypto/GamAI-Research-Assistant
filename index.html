<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI | Research Architect v2.0</title>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--primary); }
        .header { background: #fff; padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; color: var(--primary); font-size: 2rem; letter-spacing: -1px; }
        .header p { margin: 5px 0 0; color: #666; font-style: italic; }
        .content { padding: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: var(--primary); }
        input[type="text"] { padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(0,74,153,0.1); }
        button { grid-column: span 2; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #003366; transform: translateY(-2px); }
        #output-area { margin-top: 40px; padding: 25px; background: #fffdf2; border: 1px solid var(--accent); border-radius: 10px; display: none; animation: fadeIn 0.5s ease-in; }
        .result-content { line-height: 1.8; font-size: 1.05rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; color: var(--primary); font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Expert Research Design & Statistical Tool Suggestion</p>
    </div>

    <div class="content">
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., Modular Distance Learning">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Reading Comprehension Level">
            </div>
        </div>

        <button id="mainBtn" onclick="runArchitect()">Architect My Research</button>

        <div id="loading" class="loading">🔍 Analyzing variables and designing study...</div>

        <div id="output-area">
            <div class="result-content" id="ai-response"></div>
        </div>
    </div>
</div>

<script>
async function runArchitect() {
    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    const outArea = document.getElementById('output-area');
    const respDiv = document.getElementById('ai-response');
    const loading = document.getElementById('loading');

    // --- PASTE YOUR API KEY BELOW ---
    const apiKey = "AIzaSyAqaHd3PE1l8CiqVebkseBUCIiIM0u37j4"; 

    if(!iv || !dv) { alert("Please input both variables."); return; }

    loading.style.display = "block";
    outArea.style.display = "none";

    const prompt = `Act as a Professional Research Consultant.
    The researcher has these variables:
    Independent Variable (IV): ${iv}
    Dependent Variable (DV): ${dv}

    Provide the following structured output:
    1. SUGGESTED TITLES: (Provide 3 distinct, professional research titles).
    2. RESEARCH QUESTION: Formulate the primary Statement of the Problem.
    3. RESEARCH DESIGN: Recommend the best quantitative design (e.g. Quasi-experimental, Correlational, etc.) and explain why.
    4. STATISTICAL TOOL: Suggest the most appropriate statistical test (e.g. T-test, ANOVA, Pearson's r) to analyze the relationship between these variables.`;

    try {
        // UPDATED URL FOR APRIL 2026 STABLE MODEL
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();

        if (data.error) {
            respDiv.innerHTML = "<b style='color:red;'>System Error:</b> " + data.error.message;
        } else {
            const textResult = data.candidates[0].content.parts[0].text;
            // Formatting the AI text to look clean
            respDiv.innerHTML = textResult
                .replace(/\n/g, "<br>")
                .replace(/\*\*(.*?)\*\*/g, "<strong style='color:#004a99; font-size:1.2rem;'>$1</strong>")
                .replace(/\* /g, "• ");
        }
    } catch (err) {
        respDiv.innerHTML = "<b style='color:red;'>Connection Failed.</b> Please check your internet or API key.";
    } finally {
        loading.style.display = "none";
        outArea.style.display = "block";
    }
}
</script>

</body>
</html>
