<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GamAI v2.0 | Research Architect</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd600; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .app-card { max-width: 800px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #0d1642; border: 1px solid var(--accent); }
        #output { margin-top: 30px; padding: 20px; border-left: 5px solid var(--accent); background: #fffde7; display: none; line-height: 1.6; }
        .tool-tag { background: #e8eaf6; padding: 2px 8px; border-radius: 4px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>GamAI: Research Architect</h1>
        <p>Conceptualize your study in seconds</p>
    </div>
    
    <div class="content">
        <div class="input-group">
            <label>Independent Variable (IV) - The Cause</label>
            <input type="text" id="iv" placeholder="e.g., Use of Gamified Apps">
        </div>

        <div class="input-group">
            <label>Dependent Variable (DV) - The Effect</label>
            <input type="text" id="dv" placeholder="e.g., Academic Performance in Math">
        </div>

        <button onclick="generateResearch()">Architect My Research</button>

        <div id="output">
            <div id="ai-response"></div>
        </div>
    </div>
</div>

<script>
async function generateResearch() {
    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    const outputDiv = document.getElementById('output');
    const responseText = document.getElementById('ai-response');
    
    // PASTE YOUR API KEY HERE
    const apiKey = "AIzaSyA0qQtrAFgfLtkcxIbcdyftzDpnFsCs_Jk"; 

    if(!iv || !dv) { alert("Please fill in both IV and DV"); return; }

    outputDiv.style.display = "block";
    responseText.innerHTML = "<em>GamAI is brainstorming your research design...</em>";

    const prompt = `Act as a Senior Research Consultant. 
    Independent Variable (IV): ${iv}
    Dependent Variable (DV): ${dv}
    
    Based on these variables, provide:
    1. THREE SUGGESTED TITLES: (From descriptive to experimental).
    2. THE RESEARCH QUESTION: Formulate the primary Statement of the Problem.
    3. RESEARCH DESIGN: Suggest the most appropriate quantitative design.
    4. STATISTICAL TOOL: Name the specific test and why.
    
    Format the output with bold headers and clear bullet points.`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        const data = await response.json();
        const result = data.candidates[0].content.parts[0].text;
        
        // Convert Markdown-style bolding to HTML
        responseText.innerHTML = result.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        
    } catch (error) {
        responseText.innerHTML = "<span style='color:red;'>Error connecting to GamAI Engine. Please verify your API Key and Model Name.</span>";
    }
}
</script>

</body>
</html>
